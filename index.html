<!DOCTYPE html>
<html>
<head>
  <title>cool123v2 vlogs</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00eaff;
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #00eaff;
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      max-width: 600px;
      background: #111;
      border-radius: 10px;
      box-shadow: 0 0 10px #00eaff;
    }

    input, textarea, button {
      width: 80%;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00eaff;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>cool123v2 Vlogs</h1>

  <div class="box">
    <h2>Send Feedback</h2>
    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your feedback..."></textarea>
    <button onclick="sendFeedback()">Send</button>
    <p id="status"></p>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAGwycss38JoBgdvWRnqYeZj3r1X_M9Gb8",
      authDomain: "cool123v2-vlogs.firebaseapp.com",
      projectId: "cool123v2-vlogs",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.sendFeedback = async function () {
      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      if (!name || !message) {
        alert("Fill everything!");
        return;
      }

      try {
        await addDoc(collection(db, "feedback"), {
          name: name,
          message: message,
          time: new Date()
        });

        document.getElementById("status").innerText = "Sent!";
        document.getElementById("message").value = "";
      } catch (e) {
        console.error(e);
        document.getElementById("status").innerText = "Error sending!";
      }
    }
  </script>

</body>
</html>
