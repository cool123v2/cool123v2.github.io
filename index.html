<!DOCTYPE html>
<html>
<head>
  <title>cool123v2 vlogs</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00eaff;
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #00eaff;
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      max-width: 600px;
      background: #111;
      border-radius: 10px;
      box-shadow: 0 0 10px #00eaff;
    }

    input, textarea, button {
      width: 80%;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00eaff;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #00c9d6;
    }
  </style>
</head>

<body>

  <h1>cool123v2 Vlogs</h1>

  <div class="box">
    <h2>Send Feedback</h2>
    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your feedback..."></textarea>
    <button id="sendBtn">Send</button>
    <p id="status"></p>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  window.onload = function () {

    console.log("JS LOADED");

    // ✅ Your fixed Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAGwycss38JoBgdvWRnqYeZj3r1X_M9Gb8",
      authDomain: "cool123v2-vlogs.firebaseapp.com",
      projectId: "cool123v2-vlogs",
      storageBucket: "cool123v2-vlogs.appspot.com",
      messagingSenderId: "662292845970",
      appId: "1:662292845970:web:3ccd6e49796f64aaa21d4b",
      measurementId: "G-NQZM0VERV4"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Button click
    document.getElementById("sendBtn").addEventListener("click", function () {
      console.log("BUTTON CLICKED");

      const name = document.getElementById("name").value;
      const message = document.getElementById("message").value;

      if (!name || !message) {
        alert("Fill everything!");
        return;
      }

      db.collection("feedback").add({
        name: name,
        message: message,
        time: new Date()
      })
      .then(() => {
        console.log("SENT TO FIREBASE");
        document.getElementById("status").innerText = "Sent!";
        document.getElementById("message").value = "";
      })
      .catch((error) => {
        console.error("FIREBASE ERROR:", error);
        document.getElementById("status").innerText = "Error sending!";
      });
    });

  };
</script>

</body>
</html>
