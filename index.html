<!DOCTYPE html>
<html>
<head>
  <title>cool123v2 vlogs</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00eaff;
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #00eaff;
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      max-width: 600px;
      background: #111;
      border-radius: 10px;
      box-shadow: 0 0 10px #00eaff;
    }

    input, textarea, button {
      width: 80%;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00eaff;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #00c9d6;
    }
  </style>
</head>

<body>

  <h1>cool123v2 Vlogs</h1>
  <div class="box">
  <h2>My Geometry Dash Level</h2>

  <p>Roblox: cool123v2</p>
  <p>GD: COOL123V2</p>

  <!-- VIDEO -->
  <iframe width="100%" height="315"
    src="https://www.youtube.com/embed/VIDEO_ID"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <!-- RATING -->
  <h3>Rate this level ⭐</h3>
  <div id="stars">
    <button onclick="rate(1)">⭐</button>
    <button onclick="rate(2)">⭐⭐</button>
    <button onclick="rate(3)">⭐⭐⭐</button>
    <button onclick="rate(4)">⭐⭐⭐⭐</button>
    <button onclick="rate(5)">⭐⭐⭐⭐⭐</button>
  </div>

  <!-- LIKE / DISLIKE -->
  <h3>Do you like it?</h3>
  <button onclick="like()">👍 Like</button>
  <button onclick="dislike()">👎 Dislike</button>

  <p id="voteStatus"></p>
</div>

  <div class="box">
  <h2>Comments</h2>

  <input type="text" id="name" placeholder="Your name">
  <textarea id="message" placeholder="Your comment..."></textarea>
  <button id="sendBtn">Send</button>

  <p id="status"></p>

  <div id="comments"></div>
</div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
window.onload = function () {

  const firebaseConfig = {
    apiKey: "AIzaSyAGwycss38JoBgdvWRnqYeZj3r1X_M9Gb8",
    authDomain: "cool123v2-vlogs.firebaseapp.com",
    projectId: "cool123v2-vlogs",
    storageBucket: "cool123v2-vlogs.appspot.com",
    messagingSenderId: "662292845970",
    appId: "1:662292845970:web:3ccd6e49796f64aaa21d4b"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ⭐ RATE
  window.rate = function(stars) {
    db.collection("ratings").add({
      stars: stars,
      time: new Date()
    });
    alert("Rated " + stars + "⭐");
  };

  // 👍 LIKE
  window.like = function() {
    db.collection("votes").add({
      type: "like",
      time: new Date()
    });
    document.getElementById("voteStatus").innerText = "You liked this!";
  };

  // 👎 DISLIKE
  window.dislike = function() {
    db.collection("votes").add({
      type: "dislike",
      time: new Date()
    });
    document.getElementById("voteStatus").innerText = "You disliked this!";
  };

  // 💬 SEND COMMENT
  document.getElementById("sendBtn").addEventListener("click", function () {

    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if (!name || !message) {
      alert("Fill everything!");
      return;
    }

    db.collection("comments").add({
      name: name,
      message: message,
      time: new Date()
    })
    .then(() => {
      document.getElementById("status").innerText = "Sent!";
      document.getElementById("message").value = "";
      loadComments();
    });
  });

  // 📥 LOAD COMMENTS
  function loadComments() {
    const commentsDiv = document.getElementById("comments");
    commentsDiv.innerHTML = "";

    db.collection("comments").orderBy("time", "desc").get()
      .then((snapshot) => {
        snapshot.forEach(doc => {
          const data = doc.data();

          const div = document.createElement("div");
          div.style.margin = "10px";
          div.style.padding = "10px";
          div.style.background = "#111";

          div.innerHTML = "<b>" + data.name + "</b>: " + data.message;

          commentsDiv.appendChild(div);
        });
      });
  }

  loadComments();

};
</script>
</body>
</html>
