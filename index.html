<!DOCTYPE html>
<html>
<head>
  <title>cool123v2 vlogs</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00eaff;
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #00eaff;
    }

    .box {
      margin: 30px auto;
      padding: 20px;
      max-width: 600px;
      background: #111;
      border-radius: 10px;
      box-shadow: 0 0 10px #00eaff;
    }

    input, textarea, button {
      width: 80%;
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #00eaff;
      color: black;
      cursor: pointer;
    }

    button:hover {
      background: #00c9d6;
    }
  </style>
</head>

<body>

  <h1>cool123v2 Vlogs</h1>

  <div class="box">
    <h2>Send Feedback</h2>
    <input type="text" id="name" placeholder="Your name">
    <textarea id="message" placeholder="Your feedback..."></textarea>
    <button id="sendBtn">Send</button>
    <p id="status"></p>
  </div>

  <!-- Firebase -->
<script>
  console.log("JS LOADED");

  document.getElementById("sendBtn").addEventListener("click", function () {
    console.log("BUTTON CLICKED");
    alert("BUTTON WORKS");
  });
</script>

</body>
</html>
